<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Park | Reserve Parking Slot 01</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">P</span>
        <span>
          <strong>Smart Parking</strong>
          <small>Book Slot 01</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html">Dashboard</a>
        <a class="active" href="booking.html">Book Slot</a>
      </nav>
    </header>

    <main class="booking-layout">
      <section class="booking-form-panel">
        <div class="section-heading">
          <span class="eyebrow">
            <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Secure Online Booking
          </span>
          <h1>Reserve Parking Slot 01</h1>
        </div>

        <form id="bookingForm" class="booking-form">
          <label>
            Full Name
            <input id="userName" type="text" placeholder="Enter your full name" autocomplete="name" required>
          </label>

          <label>
            Vehicle Number
            <input id="vehicleNumber" type="text" placeholder="Example: MH12AB1234" maxlength="15" required>
          </label>

          <div class="form-row">
            <label>
              Start Time
              <input id="startTime" type="datetime-local" required>
            </label>
            <label>
              End Time
              <input id="endTime" type="datetime-local" required>
            </label>
          </div>

          <div class="price-box">
            <div>
              <span>Rate</span>
              <strong>₹20/hour</strong>
            </div>
            <div>
              <span>Duration</span>
              <strong id="durationText">0 hr</strong>
            </div>
            <div>
              <span>Total Amount</span>
              <strong id="priceText">₹0</strong>
            </div>
          </div>

          <p id="formMessage" class="form-message" role="alert"></p>
          <button id="confirmBookingBtn" class="btn primary full" type="submit">
            <span>Confirm Booking</span>
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </form>
      </section>

      <aside class="booking-side">
        <div class="mini-slot state-free" id="bookingMiniSlot">
          <span id="bookingStatusText">Checking...</span>
        </div>
        
        <div class="metric-card">
          <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
            Current Slot Status
          </span>
          <strong id="bookingLiveStatus font-outfit">Loading</strong>
        </div>
        
        <div class="metric-card">
          <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Booking Rule
          </span>
          <strong>Book only when free</strong>
        </div>
      </aside>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
  <script>
    // Smooth mouse hover visual card effect
    document.querySelectorAll('.hero-copy, .status-card, .parking-panel, .info-panel, .booking-form-panel, .booking-side, .ticket-card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--x', `${x}px`);
        card.style.setProperty('--y', `${y}px`);
      });
    });
  </script>
</body>
</html>
