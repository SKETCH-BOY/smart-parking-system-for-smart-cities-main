<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Park | QR ticket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">P</span>
        <span>
          <strong>Smart Parking</strong>
          <small>QR Ticket</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html">Dashboard</a>
        <a href="booking.html">Book Slot</a>
      </nav>
    </header>

    <main class="ticket-layout">
      <section id="ticketCard" class="ticket-card">
        <div class="section-heading center">
          <span class="eyebrow">
            <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Confirmed Booking
          </span>
          <h1 style="font-size: 1.85rem; margin-top: 8px;">Parking QR Ticket</h1>
        </div>

        <div id="qrcode" class="qr-box">
          <img id="staticQrCode" src="assets/qrcode.png" alt="Parking booking QR code">
        </div>

        <dl class="ticket-details">
          <div><dt>Booking ID</dt><dd id="ticketBookingId">-</dd></div>
          <div><dt>Name</dt><dd id="ticketName">-</dd></div>
          <div><dt>Vehicle Number</dt><dd id="ticketVehicle">-</dd></div>
          <div><dt>Slot Number</dt><dd>01</dd></div>
          <div><dt>Start Time</dt><dd id="ticketStart">-</dd></div>
          <div><dt>End Time</dt><dd id="ticketEnd">-</dd></div>
          <div style="grid-column: span 2;"><dt>Amount Paid</dt><dd id="ticketAmount" style="color: var(--cyan); font-size: 1.15rem;">Rs. 0</dd></div>
        </dl>

        <div class="ticket-actions">
          <button id="downloadTicketBtn" class="btn primary" type="button">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            <span>Print Ticket</span>
          </button>
          <a class="btn ghost" href="index.html">Back to Dashboard</a>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
  <script>
    // Smooth mouse hover visual card effect
    document.querySelectorAll('.hero-copy, .status-card, .parking-panel, .info-panel, .booking-form-panel, .booking-side, .ticket-card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--x', `${x}px`);
        card.style.setProperty('--y', `${y}px`);
      });
    });
  </script>
</body>
</html>
